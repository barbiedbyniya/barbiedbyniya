<!DOCTYPE html>
<html>
<head>
  <title>BarbiedByNiya</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      overflow-x: hidden;
      background: black;
      color: white;
    }

    .section {
      height: 100vh;
      position: relative;
      perspective: 1px;
      overflow: hidden;
    }

    .parallax {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 120%;
      object-fit: cover;
      transform: translateZ(-1px) scale(2);
    }

    .content {
      position: relative;
      z-index: 2;
      top: 40%;
      text-align: center;
      font-size: 30px;
      font-weight: bold;
    }

    .floating-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: hotpink;
      padding: 15px 25px;
      border-radius: 30px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .card {
      width: 250px;
      height: 300px;
      margin: 50px auto;
      background: white;
      color: black;
      border-radius: 15px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: rotateY(10deg) rotateX(10deg);
    }
  </style>
</head>

<body>

<div class="section">
  <img src="yourimage1.jpg" class="parallax">
  <div class="content">Barbie Vibes Only 💕</div>
</div>

<div class="section">
  <img src="yourimage2.jpg" class="parallax">
  <div class="content">Flawless Installs ✨</div>
</div>

<div class="section">
  <img src="yourimage3.jpg" class="parallax">
  <div class="content">Book Now 💅</div>
</div>

<div class="card">HD Lace Install</div>

<a href="#" class="floating-btn">BOOK NOW</a>

</body>
</html>
